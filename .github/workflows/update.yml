name: Test Workflow

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Update playlist file
      run: |
        echo "#EXTM3U" > playlist.m3u
        echo "#EXTINF:-1, Test Channel" >> playlist.m3u
        echo "http://example.com/test" >> playlist.m3u

    - name: Commit changes
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add playlist.m3u
        git commit -m "Auto update test" || echo "No changes"
        git push
